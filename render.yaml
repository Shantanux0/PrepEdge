services:
  # Backend Service
  - type: web
    name: prepedge-backend
    env: docker
    plan: free
    region: ohio
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: prepedge-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: prepedge-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: prepedge-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: prepedge-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: prepedge-db
          property: password
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # Frontend Service
  - type: web
    name: prepedge-frontend
    env: static
    plan: free
    region: ohio
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://prepedge-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: prepedge-db
    plan: free
    region: ohio
