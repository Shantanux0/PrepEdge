services:
  # Backend Service
  - type: web
    name: prepedge-backend
    env: docker
    repo: https://github.com/Shantanux0/PrepEdge
    plan: free
    region: ohio
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: prepedge-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: prepedge-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: prepedge-db
          property: password
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://prepedge.onrender.com
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # Frontend Service
  - type: web
    name: prepedge-frontend
    env: static
    repo: https://github.com/Shantanux0/PrepEdge
    plan: free
    region: ohio
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://prepedge-backend.onrender.com
    routingRules:
      - route: /*
        rewritePath: /index.html

databases:
  - name: prepedge-db
    plan: free
    region: ohio
