services:
  # --- Backend Web Service ---
  - type: web
    name: prepedge-backend
    runtime: java
    rootDir: PrepEdgeBackend
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/demo-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,https://prepedge.onrender.com

  # --- Frontend Static Site ---
  - type: static
    name: prepedge-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: prepedge-backend
          property: host
